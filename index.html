<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetPg TV</title>

<style>
:root {
    --bg: #020617;
    --card: #0f172a;
    --accent: #ff0000;
    --gold: #ffd700;
    --text: #e2e8f0;
}

body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* PNG STRIPE */
.png-bar {
    height: 4px;
    background: linear-gradient(to right, black, red, gold);
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
}

.logo { font-weight: bold; font-size: 1.3rem; }

.live-count {
    background: rgba(255,0,0,0.15);
    color: red;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
}

/* PLAYER */
.player-card {
    margin: 15px;
    background: black;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
}

.player-top { position: relative; }

.live-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: red;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    z-index: 2;
}

iframe {
    width: 100%;
    height: 220px;
    border: none;
}

/* FULLSCREEN BUTTON */
.fullscreen-btn {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
    z-index: 2;
}

.player-info { padding: 15px; }

.player-title { font-size: 1.1rem; font-weight: bold; }

.player-sub { font-size: 0.8rem; color: #94a3b8; }

/* SEARCH */
.search-box {
    margin: 10px 15px;
    padding: 12px;
    border-radius: 12px;
    background: #020617;
    border: 1px solid #1e293b;
    color: white;
    width: calc(100% - 30px);
}

/* GRID */
.section { padding: 15px; }

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.card {
    padding: 15px;
    border-radius: 16px;
    background: linear-gradient(135deg,#1e293b,#020617);
    cursor: pointer;
    position: relative;
    transition: 0.3s;
}

.card:hover { transform: scale(1.03); }

.card.active {
    border: 1px solid red;
    box-shadow: 0 0 10px red;
}

.badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(255,0,0,0.2);
    color: red;
    font-size: 0.7rem;
    padding: 3px 6px;
    border-radius: 10px;
}

.loading {
    text-align: center;
    padding: 20px;
    color: red;
}
</style>
</head>

<body>
    <div id="loginBox" style="padding:30px;text-align:center;">

<h2>Enter Access Token</h2>

<input type="text" id="tokenInput" placeholder="Enter token">

<button onclick="checkToken()">Open App</button>

<p id="msg"></p>

    </div>
    <div id="app" style="display:none;">

<div class="png-bar"></div>

<div class="header">
    <div class="logo">🇵🇬 NetPg TV</div>
    <div class="live-count">● LIVE</div>
</div>

<!-- PLAYER -->
<div class="player-card">
    <div class="player-top">
        <div class="live-badge">● LIVE</div>

        <iframe id="player" allowfullscreen allow="encrypted-media"></iframe>

        <button class="fullscreen-btn" onclick="goFullscreen()">⛶</button>
    </div>

    <div class="player-info">
        <div class="player-title" id="title">Loading channels...</div>
        <div class="player-sub">PNG Live Streaming</div>
    </div>
</div>

<input type="text" id="search" class="search-box" placeholder="🔍 Search channels...">

<div id="loader" class="loading">Fetching channels...</div>

<div class="section">
    <div class="grid" id="grid"></div>
</div>

<script>
const API_URL = "https://api.cdnlivetv.tv/api/v1/channels/?user=cdnlivetv&plan=free";
const PROXY = "https://corsproxy.io/?";

let allChannels = [];

async function fetchChannels() {
    try {
        const res = await fetch(PROXY + encodeURIComponent(API_URL));
        const data = await res.json();

        allChannels = data.channels || [];
        render(allChannels);

    } catch (e) {
        document.getElementById("loader").innerText = "Failed to load channels";
    }

    document.getElementById("loader").style.display = "none";
}

function render(channels) {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const priority = channels.filter(ch => {
        const name = (ch.name || "").toLowerCase();
        return name.includes("fox") || name.includes("sky sport 1");
    });

    const others = channels.filter(ch => !priority.includes(ch));
    const finalList = [...priority, ...others];

    finalList.forEach(ch => {
        if (!ch.url) return;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="badge">LIVE</div>
            <div><b>${ch.name}</b></div>
            <div style="font-size:12px;color:#94a3b8;">${ch.code?.toUpperCase() || "Live TV"}</div>
        `;

        card.onclick = () => play(card, ch.name, ch.url);
        grid.appendChild(card);
    });
}

// SEARCH
document.getElementById("search").addEventListener("input", e => {
    const val = e.target.value.toLowerCase();
    const filtered = allChannels.filter(ch =>
        (ch.name || "").toLowerCase().includes(val)
    );
    render(filtered);
});

// PLAY FUNCTION (IFRAME)
function play(el, name, url) {
    const iframe = document.getElementById("player");
    document.getElementById("title").innerText = name;

    iframe.src = url;

    document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
    el.classList.add("active");

    window.scrollTo({ top: 0, behavior: "smooth" });
}

// FULLSCREEN
function goFullscreen() {
    const iframe = document.getElementById("player");
    if (iframe.requestFullscreen) {
        iframe.requestFullscreen();
    }
}

// INIT
fetchChannels();
</script>
    </div>
    <script>

async function checkToken() {

    const token = document.getElementById("tokenInput").value;

    const res = await fetch("tokens.json");

    const data = await res.json();

    const valid = data.tokens.find(t => t.code === token);

    if(valid){

        document.getElementById("loginBox").style.display = "none";

        document.getElementById("app").style.display = "block";

    } else {

        document.getElementById("msg").innerText = "Invalid Token";

    }

}

    </script>
</body>
</html>
