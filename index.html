<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AU/NZ Live TV</title>
    <link rel="icon" href="data:,">

    <!-- ✅ Telegram Mini App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        header { text-align: center; margin-bottom: 20px; }
        
        .region-info { font-size: 0.9rem; color: var(--accent); margin-bottom: 15px; font-weight: bold; }
        
        #player-container { display: none; width: 100%; max-width: 800px; margin: 0 auto 20px; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        iframe { width: 100%; height: 400px; border: none; }
        #p-title { padding: 12px; background: var(--card); font-weight: bold; text-align: center; font-size: 1rem; border-bottom: 1px solid #334155; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; max-width: 1000px; margin: 0 auto; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; border: 1px solid transparent; position: relative; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); background: #26334d; }
        
        .card img { width: 60px; height: 60px; object-fit: contain; background: white; border-radius: 8px; padding: 5px; margin-bottom: 10px; }
        .card p { margin: 0; font-size: 0.8rem; font-weight: 600; line-height: 1.2; }
        
        .badge { position: absolute; top: 8px; right: 8px; font-size: 0.6rem; background: var(--accent); color: #000; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; }
        .loading { text-align: center; padding: 60px; color: var(--accent); font-style: italic; }
    </style>
</head>
<body>

    <header>
        <h1 style="margin: 0; font-size: 1.8rem;">Oceania TV</h1>
        <p class="region-info" id="status-text">Fetching channels...</p>
    </header>

    <!-- Player -->
    <div id="player-container">
        <div id="p-title">Select a channel</div>
        <iframe id="player" allowfullscreen></iframe>
    </div>

    <!-- Channel Grid -->
    <div class="grid" id="channel-grid">
        <div class="loading">Loading channels...</div>
    </div>

    <!-- ✅ Telegram Mini App Logic -->
    <script>
        const tg = window.Telegram.WebApp;

        // Expand app to fullscreen
        tg.expand();

        // Notify Telegram app is ready
        tg.ready();

        // Apply Telegram theme
        if (tg.themeParams) {
            document.body.style.backgroundColor = tg.themeParams.bg_color || "#0f172a";
        }

        // Optional: get user info
        const user = tg.initDataUnsafe?.user;
        if (user) {
            console.log("User:", user);
        }
    </script>

    <!-- Demo Channel Logic (you can replace with your real data) -->
    <script>
        const channels = [
            { name: "NRL Live", url: "https://example.com", logo: "https://via.placeholder.com/60", tag: "LIVE" },
            { name: "Fox Sports AU", url: "https://example.com", logo: "https://via.placeholder.com/60" },
            { name: "Sky NZ", url: "https://example.com", logo: "https://via.placeholder.com/60" }
        ];

        const grid = document.getElementById("channel-grid");
        const player = document.getElementById("player");
        const container = document.getElementById("player-container");
        const title = document.getElementById("p-title");
        const status = document.getElementById("status-text");

        grid.innerHTML = "";

        channels.forEach(ch => {
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                ${ch.tag ? `<div class="badge">${ch.tag}</div>` : ""}
                <img src="${ch.logo}" />
                <p>${ch.name}</p>
            `;

            card.onclick = () => {
                player.src = ch.url;
                title.innerText = ch.name;
                container.style.display = "block";
                window.scrollTo({ top: 0, behavior: "smooth" });
            };

            grid.appendChild(card);
        });

        status.innerText = "Channels loaded ✔";
    </script>

</body>
</html>
