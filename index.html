<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AU/NZ Live TV</title>
    <link rel="icon" href="data:,">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        header { text-align: center; margin-bottom: 20px; }
        
        .region-info { font-size: 0.9rem; color: var(--accent); margin-bottom: 15px; font-weight: bold; }
        
        #player-container { display: none; width: 100%; max-width: 800px; margin: 0 auto 20px; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        iframe { width: 100%; height: 400px; border: none; }
        #p-title { padding: 12px; background: var(--card); font-weight: bold; text-align: center; font-size: 1rem; border-bottom: 1px solid #334155; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; max-width: 1000px; margin: 0 auto; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; border: 1px solid transparent; position: relative; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); background: #26334d; }
        
        .card img { width: 60px; height: 60px; object-fit: contain; background: white; border-radius: 8px; padding: 5px; margin-bottom: 10px; }
        .card p { margin: 0; font-size: 0.8rem; font-weight: 600; line-height: 1.2; }
        
        .badge { position: absolute; top: 8px; right: 8px; font-size: 0.6rem; background: var(--accent); color: #000; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; }
        .loading { text-align: center; padding: 60px; color: var(--accent); font-style: italic; }
    </style>
</head>
<body>

    <header>
        <h1 style="margin: 0; font-size: 1.8rem;">Oceania TV</h1>
        <p class="region-info" id="status-text">Fetching channels...</p>
    </header>

    <div id="player-container">
        <div id="p-title">Select a Channel</div>
        <iframe id="main-ifr" src="" allowfullscreen allow="encrypted-media"></iframe>
    </div>

    <div id="loader" class="loading">Scanning Satellite...</div>
    <div class="grid" id="channel-grid"></div>

    <script>
        // API and Proxy config
        const API_URL = 'https://api.cdnlivetv.tv/api/v1/channels/?user=cdnlivetv&plan=free';
        const PROXY = 'https://corsproxy.io/?';

        async function fetchChannels() {
            const loader = document.getElementById('loader');
            const statusText = document.getElementById('status-text');
            
            try {
                const response = await fetch(PROXY + encodeURIComponent(API_URL));
                if (!response.ok) throw new Error("CORS Proxy Failure");
                
                const data = await response.json();
                
                // Filter specifically for Australia (au) and New Zealand (nz)
                const oceaniaChannels = (data.channels || []).filter(ch => {
                    const code = ch.code ? ch.code.toLowerCase() : '';
                    return code === 'au' || code === 'nz';
                });

                loader.style.display = 'none';
                statusText.innerText = `Online: ${oceaniaChannels.length} Channels found in AU & NZ`;
                
                renderGrid(oceaniaChannels);
            } catch (err) {
                loader.innerText = "Error loading channels. Try refreshing.";
                statusText.innerText = "Connection Failed";
                console.error("Fetch error:", err);
            }
        }

        function renderGrid(channels) {
            const grid = document.getElementById('channel-grid');
            grid.innerHTML = '';

            if (channels.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1">No channels currently active for AU/NZ region.</p>';
                return;
            }

            channels.forEach(ch => {
                // Final safety check to keep Termux logs clean
                if (!ch.url || ch.url === "null") return;

                const card = document.createElement('div');
                card.className = 'card';

                // Badge for country
                const badge = document.createElement('span');
                badge.className = 'badge';
                badge.textContent = ch.code;

                const img = document.createElement('img');
                img.src = (ch.image && ch.image.startsWith('http')) ? ch.image : "https://via.placeholder.com/60?text=TV";
                img.loading = "lazy";

                const name = document.createElement('p');
                name.textContent = ch.name;

                card.appendChild(badge);
                card.appendChild(img);
                card.appendChild(name);

                card.onclick = () => {
                    const container = document.getElementById('player-container');
                    const iframe = document.getElementById('main-ifr');
                    const title = document.getElementById('p-title');

                    title.textContent = `Watching: ${ch.name} (${ch.code.toUpperCase()})`;
                    iframe.src = ch.url;
                    container.style.display = 'block';
                    
                    // Smooth scroll to the player
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };

                grid.appendChild(card);
            });
        }

        // Initialize
        fetchChannels();
    </script>
</body>
</html>
